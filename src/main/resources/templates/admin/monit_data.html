<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css">
    <title>Data Monitoring</title>
    
  </head>
  <body>
  <div>
    <div th:insert="~{fragments/raw_data_table :: raw_data_table_obj}"></div>
    <a href="javascript:scroll(0,0)" > НАВЕРХ </a>
  </div>
    

    <!-- jQuery and Bootstrap Bundle (includes Popper) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <!-- Для обеспечения работы $.ajax -->
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script>
$(document).ready(function(){
    $("#search").keyup(function(){
    _this = this;
       $.each($("#rawtable tbody tr"), function() {
           if($(this).text().toLowerCase().indexOf($(_this).val().toLowerCase()) === -1) {
               $(this).hide();
           } else {$(this).show(); }
       });
    });
    $('#datefrom').val(myDateNow());
	$('#dateto').val(myDateNow());
  });  
  
  $(function(){
	  $('#btn-del-filtr').click(function(){
		  location.reload();
		  
	  })
  });
  
  $(function(){
	  $('#btn-filtr').click(function(){
		  var dat = new Date();
		  var numUspd  = $('#searchuspd').val()!= '' ? $('#searchuspd').val() : '0';
		  var dateFrom = $('#datefrom').val()!= '' ? $('#datefrom').val() : myDateNow();
		  var dateTo   = $('#dateto').val() != '' ? $('#dateto').val() : myDateNow();
		  $('#datefrom').val(dateFrom);
		  $('#dateto').val(dateTo);
		  		  
		  $.ajax({
		        "type": "get",
		        "url": '/admin/monit_rawdata/numUspd/'+numUspd+'/dateFrom/'+dateFrom+'/dateTo/'+dateTo,
		        "dataType": "json",
		        "cache": "false",
		        "data": "$(this).serialize()",
		        success: function (data) {
		        	//Удалим тело таблицы/////////////////
		        	var tableBody = $("#rawtable tbody");
		        	tableBody.empty();
		        	//Вставим новые записи////////////////
		        	$.each(data, function (idx, obj){
		        		$("#rawtable tbody").append(
		        			"<tr>" + "<td>" + (idx+1) + "</td>" + 
		        			         "<td  style=\"display: none;\">" + obj.idRawData + "</td>" + 
		        			         "<td>" + (new Date(obj.eventTime)).toLocaleDateString() + " " +(new Date(obj.eventTime)).toLocaleTimeString() + "</td>" + 
		        			         "<td>" + obj.ipServer + "</td>" +
		        			         "<td>" + obj.port + "</td>" +
		        			         "<td>" + obj.numUspd + "</td>" +
		        			         "<td>" + obj.rawData + "</td>" +
		        			"</tr>" 
		        				
		        		);
		        		
		        	});
		        },
		        error: function (x, e) {
	                alert(x+'     '+e);
	            }
		    });
		  
		  
	  }) 
  });
  
  /**
   * Вывод текущего времени в формате YYYY-MM-DD 
  */
  function myDateNow(){
	  var mlsk = Date.now();
	  var nowDate = new Date(mlsk);
	  var year = nowDate.getFullYear().toString();
	  var month = (nowDate.getMonth() + 1).toString().length > 1 ? (nowDate.getMonth() + 1).toString() : '0'+(nowDate.getMonth() + 1).toString();
	  var day = nowDate.getDate().toString().length > 1 ? nowDate.getDate().toString() : '0'+nowDate.getDate().toString();  
	  var dat = year + '-' + month + '-' + day;
	  return dat;
  }
</script>
    
  </body>
</html>
