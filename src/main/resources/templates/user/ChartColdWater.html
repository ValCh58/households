<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
   <meta charset="utf-8">
   <title>Диаграмма по расходу холодной воды</title>
</head>
<body>

   <div id='chart' style="width: 1400px;height: 250px;">
   </div>
   
   <script th:inline="javascript">
   
   
   
   window.onload = function () {
	   
	   //var wins = [ [ [0,3.213],[1,4.345],[2,6.677],[3,16.677] ] ];
	   //var years = [ [0,"18-04-22"+ "<br>" +"0-390004"],[1,"18-04-22<br>0-390005"],[2,"18-04-22<br>0-390006"],[3,"18-04-22<br>0-390007"] ];
	  // var listFlow = [[${listWaterFlowReport}]];//Fucking editor!!!
	   var i = -1;
	   var arrChartMain = [ [ [] ] ];
	   var arrChart = [ [] ];

	   _.each(listFlow, function(list) {
			i++; 
			if(i < 30){
			arrChartMain[0][i]=[i, list.diffCountW];
			var str = list.numAcnt;
			arrChart[i]=[i, str];
			}
		   });
       
	   Flotr.draw(document.getElementById("chart"), arrChartMain, {
			title: "Расход холодной воды",
		    colors: ['#00A8F0'],
		    ieBackgroundColor: '#0',
		    bars: {
		        show: true
		        ,barWidth: 0.5
		        ,shadowSize: 0
		        ,fillOpacity: 1
		        ,lineWidth: 0
		    		        
		    },
		    yaxis: {
		        min: 0
		        ,tickDecimals: 3
		        ,autoscaleMargin : 1
		        
		    },
		    xaxis: {
		        ticks: arrChart
		        ,showLabels: true
		        ,labelsAngle: 45
		        ,autoscale: true
		    },

		    grid: {
		        horizontalLines: true,
		        verticalLines: false
		    },
		    mouse : {
		        track : true,
		        relative : true
		      },
		});
		$(".flotr-dummy-div").parent().hide();
   }
   


   </script>
   
   
   <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
   <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
   <script th:src="@{/assets/Flotr2/flotr2.min.js}"></script>
   <script src="https://cdn.jsdelivr.net/npm/underscore@latest/underscore-umd-min.js"></script>
</body>
</html>
